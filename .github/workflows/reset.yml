name: Reset Aggregate Data

on:
  workflow_dispatch: # Web上のリセットボタンやGitHub UIから手動で起動

permissions:
  contents: write

jobs:
  reset-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Run Reset Script
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        python scripts/reset.py
        
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/active_works.json data/excluded_works.json data/status.json index.html
        
        # 変更がある場合のみコミットしてプッシュ
        if ! git diff --cached --quiet; then
          git commit -m "auto: Reset aggregate data and update exclusion list [skip ci]"
          git push origin main
        else
          echo "No changes to commit"
        fi

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLsite Maniax 週間統合ランキング (2026/07/05 ～ 2026/07/05)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --card-bg: #0f172a;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --primary-color: #3b82f6;
            --border-color: #334155;
            --rank-bg: #ef4444;
            --days-bg: #10b981;
            --rj-bg: rgba(15, 23, 42, 0.75);
        }
        body {
            font-family: 'Segoe UI', "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            line-height: 1.5;
        }
        .container {
            width: 100%;
            box-sizing: border-box;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .category-section {
            background-color: var(--container-bg);
            border-radius: 12px;
            margin-bottom: 45px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            padding: 25px;
        }
        .category-title {
            font-size: 1.6rem;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 25px;
            border-left: 6px solid var(--primary-color);
            padding-left: 12px;
            font-weight: 700;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border-color: var(--primary-color);
        }
        .thumb-container {
            display: block;
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            background-color: #020617;
            overflow: hidden;
            border-bottom: 1px solid var(--border-color);
        }
        .thumb {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .badge-overlay-top {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .badge-overlay-bottom {
            position: absolute;
            bottom: 5px;
            left: 5px;
            right: 5px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            z-index: 10;
        }
        .badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        .badge-rank {
            background-color: var(--rank-bg);
        }
        
        .badge-id-green {
            background-color: var(--days-bg);
            text-decoration: none;
            flex-shrink: 0;
            transition: opacity 0.15s ease, background-color 0.15s ease;
            color: #ffffff;
        }
        .badge-id-green:hover {
            background-color: #059669;
            color: #ffffff;
            opacity: 0.9;
        }
        
        .card-content {
            padding: 15px 10px 10px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            min-width: 0;
        }
        .work-title {
            font-size: 0.9rem;
            font-weight: 700;
            line-height: 1.4;
            margin: 0 0 12px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.8em;
        }
        .work-title a {
            color: #ffffff;
            text-decoration: none;
            transition: color 0.15s ease;
        }
        .work-title a:hover {
            color: var(--primary-color);
        }
        .circle-name {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            min-width: 0;
            gap: 10px;
        }
        .circle-name a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.15s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }
        .circle-name a:hover {
            color: var(--primary-color);
        }
        footer {
            text-align: center;
            margin-top: 60px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
            padding-top: 25px;
            padding-bottom: 40px;
        }
        .reset-btn-container {
            margin-top: 20px;
        }
        .btn-reset {
            padding: 10px 20px;
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        .btn-reset:hover {
            background-color: #dc2626;
        }
        .btn-reset:active {
            transform: scale(0.98);
        }
        .no-data {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DLsite Maniax 週間統合ランキング</h1>
            <div class="subtitle">対象期間: 2026/07/05 ～ 2026/07/05 (期間中に一度でもTop30にランクインした全作品)</div>
        </header>
        <main>
            <!-- カテゴリ1: マンガ・CG -->
            <section class="category-section">
                <h2 class="category-title">マンガ・CG <span style="font-size: 1rem; color: var(--text-muted); font-weight: normal;">(計 0作品)</span></h2>
                <div class="grid">
                    <div class="no-data">現在集約された作品はありません。</div>
                </div>
            </section>

            <!-- カテゴリ2: ゲーム・その他 -->
            <section class="category-section">
                <h2 class="category-title">ゲーム・その他 <span style="font-size: 1rem; color: var(--text-muted); font-weight: normal;">(計 0作品)</span></h2>
                <div class="grid">
                    <div class="no-data">現在集約された作品はありません。</div>
                </div>
            </section>

            <!-- カテゴリ3: ボイス・ASMR・音楽 -->
            <section class="category-section">
                <h2 class="category-title">ボイス・ASMR・音楽 <span style="font-size: 1rem; color: var(--text-muted); font-weight: normal;">(計 1作品)</span></h2>
                <div class="grid">
                    
                    <div class="card">
                        <a class="thumb-container" href="https://www.dlsite.com/maniax/work/=/product_id/RJ01660621.html" target="_blank" rel="noopener noreferrer">
                            <img class="thumb" src="https://img.dlsite.jp/resize/images2/work/doujin/RJ01661000/RJ01660621_img_main_240x240.webp" loading="lazy">
                            <div class="badge-overlay-top">
                            </div>
                            <div class="badge-overlay-bottom">
                                <span class="badge badge-rank">最高 30位</span>
                            </div>
                        </a>
                        <div class="card-content">
                            <h3 class="work-title">
                                <a href="https://www.dlsite.com/maniax/work/=/product_id/RJ01660621.html" target="_blank" rel="noopener noreferrer">筋肉モリモリマッチョ低音姉とイチャラブ日常姉弟エッチ</a>
                            </h3>
                            <div class="circle-name">
                                <a href="https://www.dlsite.com/maniax/circle/profile/=/maker_id/RG68199.html" target="_blank" rel="noopener noreferrer">やぶいぬ製糖</a>
                                <a href="https://www.google.com/search?q=RJ01660621" target="_blank" rel="noopener noreferrer" class="badge badge-id-green">RJ01660621</a>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <footer>
            <p>最終更新日時: 2026-07-05 13:22</p>
            <div class="reset-btn-container">
                <button id="reset-btn" class="btn-reset">集約データをリセットする</button>
            </div>
            <div style="margin-top: 10px;">
                <a href="#" id="clear-token-link" style="color: var(--text-muted); font-size: 0.75rem; text-decoration: underline; cursor: pointer;">トークンを再設定する</a>
            </div>
        </footer>
    </div>

    <script>
    document.getElementById('reset-btn').addEventListener('click', function() {
        if (!confirm('これまでの集約データをリセットし、現在掲載されている作品をすべて除外リストに登録しますか？\n（リセット後、次回の自動実行または再構築によって、新しい集約が最初から開始されます）')) {
            return;
        }
        
        // LocalStorageからトークンを取得
        let token = localStorage.getItem('github_token');
        
        // トークンがなければ入力させる
        if (!token) {
            token = prompt('GitHubのPersonal Access Token (PAT)を入力してください。\n（※入力されたトークンはブラウザのLocalStorageに保存され、次回以降の入力は不要になります。\n権限は actions:write または repo が必要です）');
            if (!token) {
                alert('トークンが入力されなかったため、処理をキャンセルしました。');
                return;
            }
            localStorage.setItem('github_token', token);
        }
        
        const OWNER = "noname-human-1";
        const REPO = "dlsite-ranking";
        
        if (!OWNER || !REPO || OWNER.startsWith('{{') || REPO.startsWith('{{')) {
            alert('GitHubのリポジトリ情報が正しく設定されていません。');
            return;
        }
        
        executeReset(OWNER, REPO, token);
    });

    // トークンクリア用のリンクイベント
    document.getElementById('clear-token-link').addEventListener('click', function(e) {
        e.preventDefault();
        localStorage.removeItem('github_token');
        alert('保存されていたトークンを削除しました。次回の実行時に入力を求められます。');
    });

    function executeReset(owner, repo, token, isRetry = false) {
        const url = `https://api.github.com/repos/${owner}/${repo}/actions/workflows/reset.yml/dispatches`;
        
        // リセット中はボタンを無効化
        const btn = document.getElementById('reset-btn');
        btn.disabled = true;
        btn.innerText = 'リセット処理中...';
        btn.style.backgroundColor = '#64748b';
        
        fetch(url, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28'
            },
            body: JSON.stringify({ ref: 'main' })
        })
        .then(response => {
            if (response.ok || response.status === 204) {
                alert('リセット処理（GitHub Actions）の起動に成功しました。\nバックグラウンドで処理が実行され、約1〜2分でページがクリアされます。');
                setTimeout(() => {
                    window.location.reload();
                }, 3000);
            } else {
                return response.json().then(data => {
                    // トークンが無効な場合 (401 または 403)
                    if (response.status === 401 || response.status === 403) {
                        localStorage.removeItem('github_token'); // 無効なトークンを削除
                        if (!isRetry) {
                            alert('保存されていたトークンが無効または期限切れです。新しいトークンを入力してください。');
                            const newToken = prompt('新しいGitHubのPersonal Access Token (PAT)を入力してください:');
                            if (newToken) {
                                localStorage.setItem('github_token', newToken);
                                executeReset(owner, repo, newToken, true); // 再試行
                                return;
                            }
                        }
                    }
                    throw new Error(data.message || 'APIエラー');
                });
            }
        })
        .catch(error => {
            if (error.message !== 'Failed to fetch') {
                alert('エラーが発生しました: ' + error.message + '\nトークンの権限（actions:writeまたはrepo）やリポジトリの設定を確認してください。');
            }
            btn.disabled = false;
            btn.innerText = '集約データをリセットする';
            btn.style.backgroundColor = '#ef4444';
        });
    });
    </script>
</body>
</html>
